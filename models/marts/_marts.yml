models:
  - name: fct_epl_league_table_25_26
    description: Live Premier League standings for the 2025-2026 season, including standard metrics and xG totals.
    columns:
      - name: pos
        description: League position decided by points > goal difference > goals scored.
        tests:
          - unique
          - not_null
      - name: team_name
        description: Name of team
        tests:
          - unique
          - not_null

      - name: w
        description: Total number of wins
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: d
        description: Total number of draws
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: l
        description: Total number of losses
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: pts
        description: Total number of points accumulated
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: gf
        description: Total number of goals scored
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: ga
        description: Total number of goals conceded
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: gd
        description: Goal difference calculated as total goals scored - total goals condeded
      - name: xg_for
        description: Total expected goals for accumulated
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: xg_ag
        description: Total expected goals against accumulated
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0